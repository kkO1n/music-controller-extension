<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Yandex Music Remote</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <main class="popup">
      <p class="label">Now Playing</p>
      <p id="title" class="title">Open music.yandex.ru</p>
      <p id="artists" class="artists">Track info will appear here.</p>
      <p id="progress" class="progress"></p>
      <p id="status" class="status">Waiting for player data...</p>
      <div class="controls" role="group" aria-label="Playback controls">
        <button id="previousBtn" type="button" class="control-button">Previous</button>
        <button id="playPauseBtn" type="button" class="control-button control-button-primary">
          Play/Pause
        </button>
        <button id="nextBtn" type="button" class="control-button">Next</button>
      </div>
      <p id="feedback" class="feedback"></p>
    </main>
    <script src="popup.js"></script>
  </body>
</html>
